<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafetyCulture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap');

    :root {
      --purple:    #6559FF;
      --purple-bg: rgba(101,89,255,0.08);
      --con:       #f59e0b;
      --con-bg:    rgba(245,158,11,0.09);
      --con-dark:  #d97706;
      --sidebar-w: 200px;
      --hdr-h:     52px;
      --text:      #111827;
      --text-2:    #374151;
      --text-3:    #6b7280;
      --text-4:    #9ca3af;
      --border:    #e5e7eb;
      --surface:   #fff;
      --bg:        #f3f4f6;
      --green:  #16a34a; --green-bg:  rgba(22,163,74,0.08);
      --amber:  #d97706; --amber-bg:  rgba(217,119,6,0.09);
      --red:    #dc2626; --red-bg:    rgba(220,38,38,0.08);
      --blue:   #2563eb; --blue-bg:   rgba(37,99,235,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; color: var(--text-2); background: var(--bg); -webkit-font-smoothing: antialiased; overflow: hidden; }
    button, input, textarea { font-family: inherit; }
    svg { display: block; }

    /* ── Shell ── */
    .shell { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      transition: border-color 0.2s;
    }
    .sidebar.construct-mode { border-right-color: rgba(245,158,11,0.25); }

    /* Org header */
    .sidebar-top { padding: 12px 10px 0; flex-shrink: 0; }
    .org-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 8px; cursor: pointer; transition: background .1s; }
    .org-row:hover { background: #f3f4f6; }
    .sc-mark { width: 28px; height: 28px; background: #1F2533; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .org-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Mode switcher ── */
    .mode-switcher {
      display: flex;
      background: #f3f4f6;
      border-radius: 9px;
      padding: 3px;
      margin: 10px 10px 0;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 5px 6px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-3);
      transition: background .15s, color .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .mode-btn.active-sc {
      background: var(--surface);
      color: var(--purple);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .mode-btn.active-con {
      background: var(--surface);
      color: var(--con-dark);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .mode-btn .mode-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mode-btn.active-sc .mode-dot { background: var(--purple); }
    .mode-btn.active-con .mode-dot { background: var(--con); }

    /* Nav */
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: none; }
    .sidebar-nav::-webkit-scrollbar { display: none; }
    .nav-sep { height: 1px; background: var(--border); margin: 5px 2px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--text-4); padding: 8px 6px 3px; letter-spacing: 0.04em; text-transform: uppercase; }

    .nav-item {
      display: flex; align-items: center; gap: 8px;
      height: 34px; padding: 0 8px;
      border-radius: 7px; font-size: 13px; font-weight: 500;
      color: var(--text-2); cursor: pointer;
      transition: background .1s, color .1s;
      margin-bottom: 1px; user-select: none; position: relative;
    }
    .nav-item:hover { background: #f3f4f6; color: var(--text); }
    .nav-item.active-sc { background: var(--purple-bg); color: var(--purple); font-weight: 600; }
    .nav-item.active-con { background: var(--con-bg); color: var(--con-dark); font-weight: 600; }
    .nav-item .ni { width: 15px; height: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-item .ni svg { width: 15px; height: 15px; }
    .nav-badge-num { font-size: 10px; font-weight: 700; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 5px; min-width: 17px; text-align: center; margin-left: auto; }

    /* Sidebar bottom */
    .sidebar-user { padding: 8px 10px 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; }
    .sidebar-user:hover { background: #fafafa; }
    .user-av { width: 27px; height: 27px; border-radius: 50%; background: var(--purple); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .user-n { font-size: 12px; font-weight: 600; color: var(--text); }
    .user-org { font-size: 10px; color: var(--text-4); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar { height: var(--hdr-h); min-height: var(--hdr-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 16px; flex-shrink: 0; }
    .topbar.construct-mode { border-bottom-color: rgba(245,158,11,0.2); }
    .tb-logo { display: flex; align-items: center; gap: 7px; }
    .tb-sc { width: 24px; height: 24px; background: #1F2533; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .tb-org { font-size: 13px; font-weight: 600; color: var(--text); }
    .tb-construct-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--con-bg); border: 1px solid rgba(245,158,11,0.25); color: var(--con-dark); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
    .tb-search { flex: 1; max-width: 480px; margin: 0 auto; display: flex; align-items: center; gap: 8px; background: #f3f4f6; border: 1px solid var(--border); border-radius: 22px; padding: 0 12px; height: 34px; }
    .tb-search input { flex: 1; border: none; background: transparent; outline: none; font-size: 13px; color: var(--text); }
    .tb-search input::placeholder { color: var(--text-4); }
    .tb-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .tb-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); position: relative; transition: background .1s; }
    .tb-btn:hover { background: #f3f4f6; }
    .tb-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; position: absolute; top: 5px; right: 5px; border: 2px solid var(--surface); }

    /* ── Page ── */
    .page { flex: 1; overflow-y: auto; background: var(--bg); }
    .wrap { padding: 24px 28px; max-width: 1200px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background .12s; }
    .btn-p  { background: var(--purple); color: #fff; }
    .btn-p:hover { background: #4f46e5; }
    .btn-o  { background: var(--surface); color: var(--text-2); border: 1px solid var(--border); }
    .btn-o:hover { background: #f3f4f6; }
    .btn-c  { background: var(--con); color: #fff; }
    .btn-c:hover { background: var(--con-dark); }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }

    /* ── Stat cards ── */
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat-l { font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
    .stat-v { font-size: 24px; font-weight: 700; color: var(--text); font-family: 'Poppins', sans-serif; line-height: 1; }
    .stat-c { font-size: 11px; font-weight: 500; margin-top: 4px; }
    .up { color: var(--green); } .dn { color: var(--red); }

    /* ── Card ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
    .card-h { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-ht { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); padding: 9px 14px; border-bottom: 1px solid var(--border); background: #fafafa; }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-2); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; cursor: pointer; }
    .tdn { color: var(--text); font-weight: 500; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .bg { background: #f3f4f6; color: #6b7280; }
    .br { background: var(--red-bg); color: var(--red); }
    .ba { background: var(--amber-bg); color: var(--amber); }
    .bb { background: var(--blue-bg); color: var(--blue); }
    .bv { background: var(--green-bg); color: var(--green); }
    .bp { background: var(--purple-bg); color: var(--purple); }
    .bc { background: var(--con-bg); color: var(--con-dark); }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab:hover { color: var(--text); }
    .tab.ta { color: var(--purple); border-bottom-color: var(--purple); font-weight: 600; }
    .tab.ta-c { color: var(--con-dark); border-bottom-color: var(--con); font-weight: 600; }

    /* ── SC Home ── */
    .home-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .home-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .av-stack { display: flex; }
    .av-sm { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--surface); font-size: 10px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; margin-left: -6px; flex-shrink: 0; }
    .av-sm:first-child { margin-left: 0; }
    .av-more { background: #e5e7eb; color: var(--text-2); }
    .hdr-add { font-size: 13px; font-weight: 500; color: var(--purple); cursor: pointer; background: none; border: none; display: flex; align-items: center; gap: 4px; }
    .hdr-right { margin-left: auto; display: flex; gap: 8px; }

    .gs-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; position: relative; }
    .gs-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
    .gs-bar { height: 4px; background: #e5e7eb; border-radius: 2px; width: 120px; position: absolute; top: 20px; left: 170px; }
    .gs-fill { height: 4px; background: var(--purple); border-radius: 2px; width: 30%; }
    .gs-opts { display: flex; gap: 12px; }
    .gs-opt { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: border-color .1s; }
    .gs-opt:hover { border-color: var(--purple); }
    .gs-opt-icon { font-size: 20px; color: var(--purple); }
    .gs-opt-t { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; }
    .gs-opt-d { font-size: 12px; color: var(--text-3); text-align: center; line-height: 1.4; }
    .gs-x { position: absolute; top: 14px; right: 14px; width: 22px; height: 22px; background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .gs-x:hover { background: #f3f4f6; }

    .sum-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .sum-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color .1s; }
    .sum-card:hover { border-color: #c4b5fd; }
    .sum-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--purple-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
    .sum-count { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'Poppins', sans-serif; line-height: 1; }
    .sum-label { font-size: 12px; color: var(--text-3); }

    .ip-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 24px; scrollbar-width: none; }
    .ip-scroll::-webkit-scrollbar { display: none; }
    .ip-card { min-width: 210px; max-width: 210px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; flex-shrink: 0; transition: border-color .1s; }
    .ip-card:hover { border-color: var(--purple); }
    .ip-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--purple); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
    .ip-date { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .ip-tpl { font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
    .ip-meta { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }

    .bk-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .bk-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; width: 210px; cursor: pointer; transition: border-color .1s; }
    .bk-card:hover { border-color: var(--purple); }
    .bk-type { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--purple); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
    .bk-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .bk-desc { font-size: 12px; color: var(--text-3); }

    .sec-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .sec-t { font-size: 15px; font-weight: 700; color: var(--text); }
    .cnt-badge { background: var(--purple); color: #fff; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }

    /* ── CONSTRUCT HOME ── */
    .con-home { background: var(--bg); }

    /* Greeting banner */
    .con-greeting {
      background: linear-gradient(135deg, #1c1917 0%, #1e1b4b 60%, #1c1917 100%);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }
    .con-greeting::after {
      content: '';
      position: absolute; top: -80px; right: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(245,158,11,.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .con-greet-label { font-size: 11px; font-weight: 600; color: rgba(245,158,11,0.8); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .con-greet-title { font-size: 22px; font-weight: 800; color: #fff; font-family: 'Poppins', sans-serif; margin-bottom: 6px; }
    .con-greet-sub { font-size: 13px; color: #a8a29e; }
    .con-greet-chips { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .con-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #e7e5e4; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
    .con-chip span { font-weight: 700; }

    /* AI Agent chat */
    .con-agent {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
    }
    .con-agent-row { display: flex; gap: 10px; align-items: center; }
    .con-agent-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: text;
    }
    .con-agent-input:focus-within { border-color: var(--con); box-shadow: 0 0 0 3px var(--con-bg); }
    .con-agent-icon { width: 22px; height: 22px; background: var(--con-bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
    .con-agent-input input { flex: 1; border: none; background: transparent; outline: none; font-size: 13px; color: var(--text); }
    .con-agent-input input::placeholder { color: var(--text-4); }
    .con-send { background: var(--con); border: none; color: #fff; width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .con-send:hover { background: var(--con-dark); }
    .con-suggestions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .con-sug { background: #f9fafb; border: 1px solid var(--border); color: var(--text-2); font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 6px; cursor: pointer; transition: border-color .1s, color .1s; }
    .con-sug:hover { border-color: var(--con); color: var(--con-dark); }

    /* Construct body */
    .con-body { padding: 20px 28px; }
    .con-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .con-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color .1s; }
    .con-stat:hover { border-color: var(--con); }
    .con-stat-icon { font-size: 18px; margin-bottom: 8px; }
    .con-stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'Poppins', sans-serif; line-height: 1; }
    .con-stat-lbl { font-size: 12px; color: var(--text-3); margin-top: 3px; }
    .con-stat-chg { font-size: 11px; margin-top: 3px; }

    .con-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
    .con-grid-full { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Active projects mini list */
    .proj-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .proj-row:hover { background: #fafafa; }
    .proj-row:last-child { border-bottom: none; }
    .proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .proj-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .proj-loc { font-size: 11px; color: var(--text-3); }
    .proj-prog { margin-left: auto; text-align: right; flex-shrink: 0; }
    .proj-prog-bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 3px; }
    .proj-prog-fill { height: 4px; border-radius: 2px; background: var(--con); }
    .proj-prog-pct { font-size: 10px; color: var(--text-3); text-align: right; }

    /* Activity feed */
    .act-item { display: flex; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .act-item:last-child { border-bottom: none; }
    .act-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .act-body { flex: 1; }
    .act-text { font-size: 12px; color: var(--text-2); line-height: 1.4; }
    .act-text strong { color: var(--text); }
    .act-time { font-size: 10px; color: var(--text-4); margin-top: 1px; }

    /* ── JOBS & PROJECTS ── */
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .proj-card:hover { border-color: var(--con); box-shadow: 0 2px 12px rgba(245,158,11,0.1); }
    .proj-card-hdr { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .proj-card-ico { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .proj-card-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .proj-card-client { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .proj-card-body { font-size: 12px; color: var(--text-3); display: flex; flex-direction: column; gap: 6px; }
    .proj-card-row { display: flex; justify-content: space-between; }
    .proj-card-prog { margin-top: 10px; }
    .proj-card-prog-bg { height: 5px; background: #f3f4f6; border-radius: 3px; }
    .proj-card-prog-fill { height: 5px; border-radius: 3px; background: var(--con); }
    .proj-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }

    /* ── PLANS & DRAWINGS ── */
    .dwg-shell { display: flex; height: 100%; overflow: hidden; }

    /* Sheet list */
    .dwg-list { width: 280px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .dwg-list-hdr { padding: 14px; border-bottom: 1px solid var(--border); }
    .dwg-list-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .dwg-search { display: flex; align-items: center; gap: 6px; background: #f3f4f6; border: 1px solid var(--border); border-radius: 7px; padding: 0 10px; height: 30px; }
    .dwg-search input { flex: 1; border: none; background: transparent; outline: none; font-size: 12px; color: var(--text); }
    .dwg-search input::placeholder { color: var(--text-4); }
    .dwg-list-body { flex: 1; overflow-y: auto; scrollbar-width: thin; }
    .dwg-discipline { padding: 8px 14px 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-4); }
    .dwg-sheet { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background .1s; }
    .dwg-sheet:hover { background: #fafafa; }
    .dwg-sheet.active { background: var(--con-bg); border-left: 3px solid var(--con); }
    .dwg-sheet-num { font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 1px; }
    .dwg-sheet.active .dwg-sheet-num { color: var(--con-dark); }
    .dwg-sheet-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .dwg-sheet-meta { font-size: 10px; color: var(--text-4); margin-top: 1px; }

    /* Drawing viewer */
    .dwg-viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dwg-toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface); }
    .dwg-toolbar-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .dwg-toolbar-sub { font-size: 11px; color: var(--text-3); }
    .dwg-canvas { flex: 1; background: #e8e8e8; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .dwg-placeholder { text-align: center; }
    .dwg-placeholder-img { width: 460px; height: 340px; background: white; border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .dwg-grid-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.08; }
    .dwg-title-block { position: absolute; bottom: 0; right: 0; width: 150px; border-top: 2px solid #111; border-left: 2px solid #111; padding: 8px; background: #fff; }
    .dwg-tb-row { font-size: 8px; border-bottom: 1px solid #ccc; padding: 3px 0; display: flex; gap: 4px; }
    .dwg-tb-lbl { color: #888; width: 40px; flex-shrink: 0; }
    .dwg-tb-val { color: #111; font-weight: 600; }
    .dwg-content { position: absolute; top: 20px; left: 20px; right: 170px; bottom: 20px; border: 2px solid #111; padding: 16px; }
    .dwg-north { width: 30px; height: 30px; position: absolute; top: 10px; right: 170px; font-size: 20px; transform: rotate(0deg); }

    /* Markup tools */
    .dwg-tools { display: flex; gap: 4px; margin-left: auto; }
    .dwg-tool-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-3); font-size: 14px; }
    .dwg-tool-btn:hover { background: #f3f4f6; color: var(--text); }
    .dwg-tool-btn.active { background: var(--con-bg); border-color: var(--con); color: var(--con-dark); }

    .dwg-info-panel { width: 220px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 14px; }
    .dwg-info-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .dwg-info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .dwg-info-lbl { color: var(--text-3); }
    .dwg-info-val { color: var(--text); font-weight: 500; }
    .dwg-anno-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .dwg-anno-type { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
    .dwg-anno-text { font-size: 12px; color: var(--text-2); }

    /* ── Project bar ── */
    .project-bar {
      height: 38px; min-height: 38px;
      background: var(--surface);
      border-bottom: 1px solid rgba(245,158,11,0.2);
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px; flex-shrink: 0;
    }
    .proj-bar-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 10px 3px 8px;
      background: var(--con-bg);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 7px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--con-dark);
      position: relative; transition: background .1s;
    }
    .proj-bar-btn:hover { background: rgba(245,158,11,0.14); }
    .proj-bar-sep { width: 1px; height: 18px; background: var(--border); }
    .proj-bar-meta { font-size: 11px; color: var(--text-3); }

    /* Project dropdown */
    .proj-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.13);
      min-width: 268px; z-index: 200; overflow: hidden;
    }
    .proj-dd-hdr { padding: 8px 12px 6px; font-size: 10px; font-weight: 700; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.05em; }
    .proj-dd-item {
      padding: 8px 12px; cursor: pointer; display: flex;
      align-items: center; gap: 10px; transition: background .1s;
      border-top: 1px solid #f3f4f6;
    }
    .proj-dd-item:first-of-type { border-top: none; }
    .proj-dd-item:hover { background: #f9fafb; }
    .proj-dd-item.dd-active { background: var(--con-bg); }
    .proj-dd-ico { font-size: 16px; flex-shrink: 0; }
    .proj-dd-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .proj-dd-sub { font-size: 11px; color: var(--text-3); }

    /* ── Markup panel ── */
    .dwg-markup-bar { display: flex; gap: 2px; align-items: center; background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; padding: 3px 6px; }
    .dwg-markup-item { padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: border-color .12s, background .12s; }
    .dwg-markup-item:hover { border-color: rgba(245,158,11,0.4); }
    .dwg-markup-item.mk-active { border-color: var(--con); background: var(--con-bg); }

    /* Generic */
    .gen-page { padding: 24px 28px; max-width: 1200px; }
    .gen-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 16px; }
    .gen-title { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'Poppins', sans-serif; }
    .gen-sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .empty-state { padding: 60px 20px; text-align: center; }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-t { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-s { font-size: 13px; color: var(--text-3); }

    /* Progress bar */
    .prog-bg { background: var(--border); border-radius: 3px; }
    .prog-fill { border-radius: 3px; }

    /* Grid helpers */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .mb4 { margin-bottom: 16px; }
    .mb6 { margin-bottom: 24px; }
    .muted { color: var(--text-3); }

    /* ── Mobile Overlay ── */
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes mob-in { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .mobile-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px); }
    .mobile-frame { width:375px;height:812px;background:#f3f4f6;border-radius:50px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 50px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.08),inset 0 0 0 1px rgba(255,255,255,0.04);animation:mob-in .25s ease; }
    .mobile-body { flex:1;overflow-y:auto;background:white;scroll-behavior:smooth; }
    .mob-chip { background:white;border:1.5px solid #6559FF;color:#6559FF;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s; }

    .mob-card { background:#f9fafb;border-radius:14px;padding:13px;margin-top:8px;border:1px solid #f0f0f0; }
    .mob-check-row { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;cursor:pointer; }
    .mob-check-row:last-of-type { border-bottom:none; }
    .mob-check-box { width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0;transition:all .15s; }
    .mob-check-box.checked { background:#6559FF;border-color:#6559FF; }
    .mob-advance-btn { width:100%;margin-top:12px;background:#6559FF;color:white;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s; }
    .mob-advance-btn:hover { opacity:.9; }
    .mob-done-btn { background:#6559FF;color:white;border:none;border-radius:12px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer; }
    .mob-open-btn { display:flex;align-items:center;gap:6px;background:#1F2533;color:white;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s; }
    .mob-open-btn:hover { opacity:.85; }
    .mob-drawer-overlay { position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s ease;border-radius:50px; }
    .mob-drawer-overlay.open { opacity:1;pointer-events:all; }
    .mob-drawer { position:absolute;top:0;left:0;bottom:0;width:290px;background:white;z-index:60;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);border-radius:50px 0 0 50px; }
    .mob-drawer.open { transform:translateX(0); }

    /* Drawing upload modal */
    .dwg-upload-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px); }
    .dwg-upload-panel { background:white;border-radius:20px;padding:28px;width:100%;max-width:520px;box-shadow:0 30px 60px rgba(0,0,0,0.3); }
    .dwg-drop-zone { border:2px dashed #d1d5db;border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa; }
    .dwg-drop-zone:hover { border-color:#6559FF;background:#f5f3ff; }
    .dwg-process-step { display:flex;align-items:center;gap:12px;padding:10px 0;font-size:13px;color:#374151; }
    .dwg-process-step.done { color:#16a34a; }
    .dwg-process-step.active { color:#6559FF;font-weight:600; }
    .dwg-process-step.pending { color:#d1d5db; }
    .dwg-field-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin:14px 0; }
    .dwg-field { display:flex;flex-direction:column;gap:3px; }
    .dwg-field-label { font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em; }
    .dwg-field-value { font-size:13px;font-weight:600;color:#111827; }

    /* Mobile drawing viewer */
    .mob-dwg-viewer { position:relative;flex:1;overflow:hidden;background:#1a1a2e;display:flex;flex-direction:column; }
    .mob-dwg-svg-wrap { flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:grab; }
    .mob-dwg-controls { position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:10; }
    .mob-dwg-ctrl-btn { width:34px;height:34px;background:rgba(0,0,0,0.6);border-radius:8px;color:white;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);border:none; }
    .mob-dwg-info-btn { position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:white;font-size:12px;font-weight:600;padding:8px 18px;cursor:pointer;backdrop-filter:blur(8px);z-index:10;display:flex;align-items:center;gap:6px; }
    .mob-dwg-info-panel { position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;padding:18px;z-index:20;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:70%;overflow-y:auto; }
    .mob-dwg-info-panel.open { transform:translateY(0); }
  </style>
</head>

// ── Sidebar ──────────────────────────────────────────────────
function sidebar() {
  const isC = S.mode === 'construct';
  const nav  = isC ? CON_NAV : SC_NAV;
  const activeClass = isC ? 'active-con' : 'active-sc';
  const activeCheck = v => S.view === v;

  const items = nav.map(n => {
    if (n.sep) return `<div class="nav-sep"></div>`;
    if (n.section) return `<div class="nav-label">${n.label}</div>`;
    // Phase-gated items: hide if current phase < required phase
    if (n.phase && S.phase < n.phase) return '';
    const active = activeCheck(n.view);
    return `<div class="nav-item ${active ? activeClass : ''}" data-view="${n.view}">
      <span class="ni">${I[n.icon] || ''}</span>
      <span style="flex:1">${n.label}</span>
      ${n.badge ? `<span class="nav-badge-num">${n.badge}</span>` : ''}
    </div>`;
  }).join('');

  return `
    <aside class="sidebar ${isC ? 'construct-mode' : ''}">
      <div class="sidebar-top">
        <div class="org-row">
          <div class="sc-mark">${SCLOGO}</div>
          <span class="org-name">BDW Constructions</span>
          <span style="color:var(--text-4);font-size:11px">▾</span>
        </div>
        <div class="mode-switcher">
          <button class="mode-btn ${!isC ? 'active-sc' : ''}" data-mode="sc">
            <span class="mode-dot"></span>SafetyCulture
          </button>
          <button class="mode-btn ${isC ? 'active-con' : ''}" data-mode="construct">
            <span class="mode-dot"></span>Construct
          </button>
        </div>
      </div>
      <nav class="sidebar-nav">${items}
        <div class="nav-sep"></div>
        <div class="nav-item ${S.view==='settings'?activeClass:''}" data-view="settings">
          <span class="ni">${I.settings}</span><span>Settings</span>
        </div>
      </nav>
      <div class="sidebar-user">
        <div class="user-av">BW</div>
        <div style="flex:1;min-width:0">
          <div class="user-n">Blaker Wyer</div>
          <div class="user-org">BDW Constructions</div>
        </div>
        <span style="color:var(--text-4)">${I.chevron}</span>
      </div>

}

  }

  // Phase sub-card (below expanded project)
  function phaseCards(phases, accent) {

  return `<div class="page"><div class="gen-page" style="max-width:1160px">
    <div class="gen-hdr">
      <div>
        <div class="gen-title">Project Hierarchy</div>
        <div class="gen-sub">BDW Constructions · Western Australia · 3 active projects · $27.8M portfolio</div>

    </div>
  </div></div>`;
}

        return `<div style="display:flex;align-items:center;flex:1">

          </div>
          ${i < steps.length-1 ? `<div style="flex:1;height:1px;background:${isDone?'var(--green)':'var(--border)'};margin:0 12px"></div>` : ''}
        </div>`;

        </div>`).join('')}

        <!-- Exclusions -->
        <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px 18px;margin-bottom:20px">

// ── SWMS & HRCW View ─────────────────────────────────────────
function vConSWMS() {

  function riskBand(l,c) {
    const s = l*c;
    if (s>=20) return {score:s, band:'EXTREME', col:'#dc2626', bg:'rgba(220,38,38,.12)'};
    if (s>=13) return {score:s, band:'HIGH',    col:'#f59e0b', bg:'rgba(245,158,11,.12)'};
    if (s>=5)  return {score:s, band:'MED',     col:'#ca8a04', bg:'rgba(202,138,4,.10)'};
    return           {score:s, band:'LOW',     col:'#16a34a', bg:'rgba(22,163,74,.08)'};
  }

  const statusCfg = {
    'approved':          { label:'✓ Approved',           col:'#16a34a', bg:'rgba(22,163,74,.1)'    },
    'awaiting-approval': { label:'⏳ Awaiting Approval',  col:'#d97706', bg:'rgba(217,119,6,.1)'    },
    'draft':             { label:'◯ Draft',               col:'#6b7280', bg:'rgba(107,114,128,.1)'  },
    'expired':           { label:'✕ Expired',             col:'#dc2626', bg:'rgba(220,38,38,.1)'    },
  };

  // ── Kiosk Sign-On ─────────────────────────────────────────
  if (S.swmsView === 'sign-on') {
    const doc = SWMS_DOCS.find(d => d.id === S.swmsDoc);
    if (!doc) { S = {...S, swmsView:'register'}; return vConSWMS(); }
    const kioskCount = S.swmsKioskCount || 0;
    const totalSigned = doc.workers.signed + kioskCount;
    const remaining = doc.workers.assigned - totalSigned;
    const isDone = remaining <= 0;
    const kioskNames = ['Jake T.','Liam R.','Marcus J.','Tom O.','Wei L.','Aiden C.','Raj P.','Brett H.'];
    const kioskRoles = ['Electrician','Electrician','Electrical Observer','Electrician','Electrician','Crane Operator','Site Supervisor','Safety Officer'];
    const currentName = kioskNames[kioskCount] || 'Worker';
    const currentRole = kioskRoles[kioskCount] || 'Electrician';
    const allSigned = doc.signedWorkers.map(w=>w.name.split(' ')[0]).concat(kioskNames.slice(0,kioskCount));

    if (isDone) {
      return `
      <div class="page-wrap" style="background:#1F2533;min-height:100%;display:flex;align-items:center;justify-content:center">
        <div style="text-align:center;padding:48px 40px;max-width:520px">
          <div style="font-size:60px;margin-bottom:16px">✅</div>
          <div style="font-size:28px;font-weight:800;color:white;margin-bottom:8px">Crew Signed On.</div>
          <div style="font-size:16px;color:rgba(255,255,255,.5);margin-bottom:4px">All ${doc.workers.assigned} workers have signed the SWMS.</div>
          <div style="font-size:14px;color:#6559FF;font-weight:700;margin-bottom:32px">Work may commence — HRCW is compliant.</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px">
            ${allSigned.map(n=>`<div style="background:rgba(22,163,74,.2);border:1px solid rgba(22,163,74,.3);border-radius:8px;padding:7px 14px;font-size:12px;color:#4ade80;font-weight:600">✓ ${n}</div>`).join('')}
          </div>
          <button data-swms-nav="detail" style="background:#6559FF;color:white;border:none;border-radius:12px;padding:13px 32px;font-size:14px;font-weight:700;cursor:pointer">Done — View SWMS Record</button>
        </div>
      </div>`;
    }

    return `
    <div class="page-wrap" style="background:#1F2533;min-height:100%">
      <div style="max-width:480px;margin:0 auto;padding:24px 20px">

        <!-- SWMS identity bar -->
        <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:15px 18px;margin-bottom:18px;text-align:center">
          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Sign On To SWMS</div>
          <div style="font-size:14px;font-weight:700;color:white;line-height:1.35">${doc.title}</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px">
            <span style="font-size:11px;background:rgba(22,163,74,.25);color:#4ade80;padding:3px 10px;border-radius:6px;font-weight:700">✓ Approved</span>
            <span style="font-size:11px;color:rgba(255,255,255,.35)">${doc.versionLabel}</span>
          </div>
        </div>

        <!-- Worker form -->
        <div style="background:white;border-radius:16px;overflow:hidden;margin-bottom:14px">
          <div style="background:#f1f5f9;padding:11px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between">
            <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Worker ${totalSigned+1} of ${doc.workers.assigned}</div>
            <div style="font-size:11px;color:var(--text-4)">${remaining-1} more after this</div>
          </div>
          <div style="padding:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
              <div>
                <label style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">Name</label>
                <input value="${currentName}" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:600;color:var(--text)"/>
              </div>
              <div>
                <label style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">Role / Trade</label>
                <input value="${currentRole}" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:600;color:var(--text)"/>
              </div>
            </div>

            <!-- 4 declarations (from real SWMS documents) -->
            <div style="background:#f8f9fb;border-radius:10px;padding:12px 14px;margin-bottom:14px">
              <div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Confirm before signing:</div>
              ${['I have been consulted on this SWMS','I have read and understood the control measures','I have or will obtain all required PPE','I hold the required licences and training for this work'].map((d,i)=>`
              <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-2);padding:6px 0;cursor:pointer;${i<3?'border-bottom:1px solid #e5e7eb;':''}">
                <input type="checkbox" checked style="width:16px;height:16px;accent-color:#6559FF;flex-shrink:0"/>
                ${d}
              </label>`).join('')}
            </div>

            <!-- Signature -->
            <div>
              <label style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">Signature — tap to sign</label>
              <div style="border:2px dashed #d1d5db;border-radius:10px;height:72px;background:#fafafa;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:22px;color:#374151;font-style:italic;cursor:pointer">${currentName.split(' ')[0]}</div>
            </div>
          </div>

          <!-- Buttons -->
          <div style="padding:14px 16px;background:#f8f9fb;border-top:1px solid #e5e7eb;display:flex;gap:10px">
            <button id="kiosk-sign-btn" style="flex:2;background:#16a34a;color:white;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">✓ Confirm & Sign On</button>
            <button data-swms-nav="detail" style="flex:1;background:white;border:1.5px solid var(--border);border-radius:10px;padding:13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-3)">Exit</button>
          </div>
        </div>

        <!-- Live counter -->
        <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;text-align:center">
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Signed on</div>
          <div style="font-size:30px;font-weight:800;color:white">${totalSigned} <span style="font-size:18px;font-weight:500;color:rgba(255,255,255,.35)">of ${doc.workers.assigned}</span></div>
          ${allSigned.length > 0 ? `<div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:5px">${allSigned.join(', ')}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  // ── Detail view ────────────────────────────────────────────
  if (S.swmsView === 'detail' && S.swmsDoc) {
    const doc = SWMS_DOCS.find(d => d.id === S.swmsDoc);
    if (!doc) { S = {...S, swmsView:'register'}; return vConSWMS(); }
    const sc = statusCfg[doc.status] || statusCfg['draft'];
    const tab = S.swmsTab || 'document';
    const signedCount = doc.workers.signed + (S.swmsKioskCount||0);
    const tabs = [
      {id:'document', label:'Document'},
      {id:'sign-on',  label:`Sign-On (${signedCount}/${doc.workers.assigned})`},
      {id:'approval', label:'Approval Chain'},
      {id:'audit',    label:'Audit Trail'},
    ];

    return `
    <div class="page-wrap" style="background:#f3f4f6;min-height:100%">

      <!-- Detail header -->
      <div style="background:white;border-bottom:1px solid var(--border);padding:16px 24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <button data-swms-nav="register" style="background:#f3f4f6;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-2)">← SWMS Register</button>
          <span style="font-size:11px;color:var(--text-4)">/ ${doc.code}</span>
          <div style="margin-left:auto;display:flex;gap:8px">
            <button style="background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-2)">Export PDF</button>
            ${doc.status === 'approved' ? `<button data-swms-nav="sign-on" style="background:#16a34a;color:white;border:none;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer">📋 Start Pre-Start Briefing</button>` : ''}
            ${doc.status === 'draft' ? `<button style="background:#6559FF;color:white;border:none;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer">Submit for Approval →</button>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:start;gap:16px;margin-bottom:12px">
          <div>
            <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px">${doc.title}</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
              <span style="background:${sc.bg};color:${sc.col};font-size:12px;font-weight:700;padding:4px 10px;border-radius:7px">${sc.label}</span>
              <span style="font-size:12px;color:var(--text-3);background:#f3f4f6;padding:3px 9px;border-radius:6px">${doc.versionLabel}</span>
              <span style="font-size:12px;color:var(--text-3)">📌 ${doc.state}</span>
              ${doc.hrcw.map(h=>`<span style="background:rgba(220,38,38,.08);color:#dc2626;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px">⚠ ${h}</span>`).join('')}
            </div>
          </div>
        </div>
        <!-- Tabs -->
        <div style="display:flex;gap:0;border-bottom:2px solid #f3f4f6;margin-bottom:-2px">
          ${tabs.map(t=>`<button data-swms-tab="${t.id}" style="padding:9px 16px;font-size:13px;font-weight:${tab===t.id?'700':'500'};color:${tab===t.id?'#6559FF':'var(--text-3)'};background:none;border:none;border-bottom:2px solid ${tab===t.id?'#6559FF':'transparent'};cursor:pointer;margin-bottom:-2px">${t.label}</button>`).join('')}
        </div>
      </div>

      ${tab === 'document' ? `
      <!-- Document tab: metadata + PPE left, hazard table right -->
      <div style="padding:20px 24px;display:grid;grid-template-columns:270px 1fr;gap:18px;align-items:start">

        <!-- Left column -->
        <div style="display:flex;flex-direction:column;gap:14px">
          <!-- Doc metadata -->
          <div style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:11px">Document Details</div>
            ${[['Code',doc.code],['Version',doc.versionLabel],['State / Jurisdiction',doc.state],['Permit Required',doc.permitRequired],['Created by',doc.createdBy],['Approved by',doc.approvedBy||'—'],['Approved at',doc.approvedAt||'—'],['Next review',doc.nextReview||'—']].map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px">
              <span style="color:var(--text-3)">${k}</span><span style="color:var(--text-2);font-weight:600;text-align:right;max-width:55%">${v}</span>
            </div>`).join('')}
          </div>
          <!-- Scope -->
          <div style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Scope of Works</div>
            <div style="font-size:12px;color:var(--text-2);line-height:1.65">${doc.scopeOfWorks}</div>
          </div>
          <!-- PPE grid -->
          <div style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px">Required PPE</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">
              ${PPE_ITEMS.map(p=>{const req=doc.ppeRequired.includes(p.id);return `<div style="background:${req?'rgba(101,89,255,.08)':'#f8f9fb'};border:1.5px solid ${req?'rgba(101,89,255,.2)':'#f0f0f0'};border-radius:8px;padding:7px 3px;text-align:center;${req?'':'opacity:.3'}"><div style="font-size:18px;margin-bottom:2px">${p.emoji}</div><div style="font-size:8px;font-weight:${req?'700':'400'};color:${req?'#6559FF':'var(--text-4)'};line-height:1.2">${p.label}</div></div>`;}).join('')}
            </div>
          </div>
        </div>

        <!-- Right: Hazard/Control table — THE key visual -->
        <div style="background:white;border:1.5px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
            <div style="font-size:13px;font-weight:700;color:var(--text)">Hazard Identification & Risk Control</div>
            <div style="display:flex;gap:5px">
              ${[['LOW','#16a34a'],['MED','#ca8a04'],['HIGH','#f59e0b'],['EXTREME','#dc2626']].map(([l,c])=>`<span style="background:${c}18;color:${c};font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px">${l}</span>`).join('')}
            </div>
          </div>
          <!-- Col headers -->
          <div style="display:grid;grid-template-columns:28px 170px 1fr 90px 72px 72px;background:#f8f9fb;border-bottom:1px solid var(--border)">
            ${['#','Job Step / Hazard','Control Measures','Hierarchy','Init Risk','Resid Risk'].map(h=>`<div style="padding:8px 10px;font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em">${h}</div>`).join('')}
          </div>
          <!-- Rows -->
          ${doc.steps.map(step=>`
          <div style="display:grid;grid-template-columns:28px 170px 1fr 90px 72px 72px;background:#eef2f7;border-bottom:1px solid #dde3ee">
            <div style="padding:10px 10px;font-size:12px;font-weight:800;color:#1F2533">${step.num}</div>
            <div style="padding:10px 10px;font-size:12px;font-weight:700;color:#1F2533;grid-column:2/-1;display:flex;align-items:center;gap:8px">
              ${step.title}
            </div>
          </div>

  // ── Sub-view: Verify Worker (foreman scan flow) ─────────────

    if (S.passportVerifyStep === 0) {

                  <div style="position:absolute;bottom:0;left:0;width:32px;height:32px;border-bottom:3px solid #6559FF;border-left:3px solid #6559FF;border-radius:0 0 0 4px"></div>

                <button data-passport-scan="w2" style="background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:#14532d">📲 Priya Sharma — Green</button>

    if (S.passportVerifyStep === 1) {

  // ── Sub-view: Site Induction flow ───────────────────────────
  if (S.passportView === 'induction') {
    const steps = [
      { label:'Worker Details',    icon:'👤', desc:'Collect name, date of birth, employer, and role.' },
      { label:'Credential Upload', icon:'📎', desc:'Upload White Card, licences, and supporting documents.' },
      { label:'Site Safety Brief', icon:'🦺', desc:'Watch the 4-minute site safety video and confirm understanding.' },

      { label:'Passport Issued',   icon:'🪪', desc:'Digital Worker Passport generated and added to wallet.' },

    const step = S.passportInductionStep || 0;
    const isLast = step === steps.length - 1;
    const isDone = step >= steps.length;

    if (isDone) {
      return `
      <div class="page-wrap" style="background:#f3f4f6;min-height:100%;display:flex;align-items:center;justify-content:center">
        <div style="background:white;border:1.5px solid #bbf7d0;border-radius:20px;padding:48px 40px;text-align:center;max-width:480px">

    return `

// ── Render ───────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = `
    <div class="shell">
      ${sidebar()}
      <div class="main">
        ${topbar()}
        ${projectBar()}
        ${view()}
      </div>
    </div>
    ${demoControlsPanel()}
    ${procureProModal()}
    ${dwgUploadModal()}
    ${vMobile()}`;

  // Nav clicks (sidebar + generic [data-view] except back-button which has data-exit-project)
  document.querySelectorAll('[data-view]:not([data-exit-project])').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const v = el.dataset.view;
      // Reset programme to Schedule > Master when navigating there via sidebar
      if (v === 'con-programme') {
        S = { ...S, view: 'con-programme', progTopTab: 'schedule', progSubTab: 'master', progStep: null };
        render();
      } else if (v === 'con-drawings') {
        S = { ...S, view: 'con-drawings', dwgView: 'register' };
        render();
      } else if (v === 'con-passport') {
        S = { ...S, view: 'con-passport', passportView: 'dashboard', passportWorker: null, passportVerifyStep: 0, passportVerifyWorker: null, passportInductionStep: 0 };
        render();
      } else if (v === 'con-swms') {
        S = { ...S, view: 'con-swms', swmsView: 'register', swmsDoc: null, swmsTab: 'document', swmsKioskCount: 0 };
        render();
      } else {
        go(v);
      }
    })
  );

  // Back to Jobs & Projects from project bar
  document.querySelectorAll('[data-exit-project]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, view: 'con-jobs', inProject: false, project: null, showProjectDrop: false };
      render();
    })
  );

  // Mode switcher
  document.querySelectorAll('[data-mode]').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); setMode(el.dataset.mode); })
  );

  // Drawing sheet clicks
  document.querySelectorAll('[data-drawing]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, activeDrawing: parseInt(el.dataset.drawing), view: 'con-drawings' };
      render();
    })
  );

  // Project cards in Jobs & Projects → enter project hub
  document.querySelectorAll('[data-enter-proj]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      enterProject(el.dataset.enterProj);
    })
  );

  // Jobs view toggle (grid / hierarchy)
  document.querySelectorAll('[data-jobs-view]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, jobsView: el.dataset.jobsView };
      render();
    })
  );

  // Jobs hierarchy expand/collapse
  document.querySelectorAll('[data-jobs-expand]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.jobsExpand;
      const exp = { ...S.jobsExpanded };
      exp[id] = !exp[id];
      S = { ...S, jobsExpanded: exp };
      render();
    })
  );

  // Project bar switcher toggle
  document.querySelectorAll('[data-proj-toggle]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, showProjectDrop: !S.showProjectDrop };
      render();
    })
  );

  // Switch project from dropdown (stays in project context, goes to hub)
  document.querySelectorAll('[data-proj-switch]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      enterProject(el.dataset.projSwitch);
    })
  );

  // Close project dropdown on outside click
  document.addEventListener('click', () => {
    if (S.showProjectDrop) { S = { ...S, showProjectDrop: false }; render(); }

  // Project module tabs
  document.querySelectorAll('[data-proj-tab]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, projectTab: el.dataset.projTab };
      render();
    })

  );

  // Programme sub-tab (Master Programme / AI Builder)
  document.querySelectorAll('[data-prog-sub-tab]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, view: 'con-programme', progSubTab: el.dataset.progSubTab, progStep: null };
      render();
    })
  );

  // Programme workflow steps (upload / analysing / review)
  document.querySelectorAll('[data-prog-step]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const src = el.dataset.progSource || null;
      S = { ...S, view: 'con-programme', progTopTab: 'schedule', progSubTab: 'ai-builder', progStep: el.dataset.progStep || null, progSource: src !== null ? src : S.progSource };
      render();
    })
  );

  // Programme confirm → go to Programme module, Master Programme view of the project
  document.querySelectorAll('[data-prog-confirm]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, progStep: null, project: 'north-harbour', inProject: true, view: 'con-programme', progTopTab: 'schedule', progSubTab: 'master' };
      render();
    })
  );

  // ProcurePro document modal
  document.getElementById('pp-doc-btn')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, showProcureProModal: true };
    render();
  });
  document.querySelectorAll('#pp-modal-close').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, showProcureProModal: false };
      render();
    })
  );
  document.getElementById('pp-modal-backdrop')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) { S = { ...S, showProcureProModal: false }; render(); }
  });

  // Demo controls panel toggle
  document.getElementById('demo-toggle')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, showDemoPanel: !S.showDemoPanel };
    render();
  });

  // Phase selector
  document.querySelectorAll('[data-set-phase]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const n = parseInt(el.dataset.setPhase);
      const phase = PHASES.find(p => p.n === n);
      if (phase && !phase.comingSoon) setPhase(n);
    })
  );

  // Feature flag toggles (independent of phase)
  document.querySelectorAll('[data-ff-toggle]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.ffToggle;
      S = { ...S, featureFlags: { ...S.featureFlags, [id]: !S.featureFlags[id] } };
      render();
    })
  );

  // ── Worker Passport event handlers ──────────────────────────

  // Navigate between passport sub-views
  document.querySelectorAll('[data-passport-view]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const v = el.dataset.passportView;
      if (v === 'dashboard') {
        S = { ...S, passportView:'dashboard', passportWorker:null, passportVerifyStep:0, passportVerifyWorker:null, passportInductionStep:0 };
      } else if (v === 'verify') {
        S = { ...S, passportView:'verify', passportVerifyStep:0, passportVerifyWorker:null };
      } else if (v === 'induction') {
        S = { ...S, passportView:'induction', passportInductionStep:0 };
      } else {
        S = { ...S, passportView:v };
      }
      render();
    })
  );

  // Open worker wallet (from table row or View button)
  document.querySelectorAll('[data-passport-open]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, passportView:'wallet', passportWorker: el.dataset.passportOpen };
      render();
    })
  );

  // Simulate QR scan — show scanning animation then result
  document.querySelectorAll('[data-passport-scan]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const workerId = el.dataset.passportScan;
      S = { ...S, passportView:'verify', passportVerifyStep:1, passportVerifyWorker:workerId };
      render();
      // Auto-advance to result after 1.5s
      setTimeout(() => {
        S = { ...S, passportVerifyStep:2 };
        render();
      }, 1500);
    })
  );

  // Direct verify from dashboard table
  document.querySelectorAll('[data-passport-scan-direct]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const workerId = el.dataset.passportScanDirect;
      S = { ...S, passportView:'verify', passportVerifyStep:1, passportVerifyWorker:workerId };
      render();
      setTimeout(() => {
        S = { ...S, passportVerifyStep:2 };
        render();
      }, 1500);
    })
  );

  // Reset verify flow
  document.querySelectorAll('[data-passport-verify-reset]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, passportVerifyStep:0, passportVerifyWorker:null };
      render();
    })
  );

  // Induction next/back
  document.querySelectorAll('[data-passport-induction-next]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, passportInductionStep: (S.passportInductionStep || 0) + 1 };
      render();
    })
  );
  document.querySelectorAll('[data-passport-induction-back]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      if ((S.passportInductionStep || 0) > 0) {
        S = { ...S, passportInductionStep: S.passportInductionStep - 1 };
        render();
      }
    })
  );

  // ── Mobile Experience handlers ───────────────────────────────

  function mobScrollBottom() {
    setTimeout(() => {
      const b = document.getElementById('mobile-body');
      if (b) b.scrollTop = b.scrollHeight;
    }, 30);
  }

  function mobAgentReply(msg, extraState) {
    S = { ...S, mobileTyping: true, ...(extraState||{}) };
    render(); mobScrollBottom();
    setTimeout(() => {
      S = { ...S, mobileTyping: false, mobileMsgs: [...S.mobileMsgs, { role:'agent', ...msg }], mobileStep: S.mobileStep + 1 };
      render(); mobScrollBottom();
    }, 900);
  }

  function mobAdvanceFlow(userText) {
    const flow = MOBILE_FLOWS[S.mobileFlow];
    if (!flow) return;
    const nextStep = flow.steps[S.mobileStep];
    if (!nextStep) return;
    // Mark current agent chips as used
    const updatedMsgs = S.mobileMsgs.map((m,i) => i === S.mobileMsgs.length-1 ? {...m, chipsUsed:true} : m);
    const userMsg = userText ? { role:'user', text: userText } : null;
    S = { ...S, mobileMsgs: userMsg ? [...updatedMsgs, userMsg] : updatedMsgs };
    mobAgentReply(nextStep);
  }

  function mobReset(extra) {
    return { mobileFlow: null, mobileStep: 0, mobileMsgs: [], mobileTyping: false, mobileChecked: [], mobileDeclared: [], mobileSigned: false, mobileDrawerOpen: false, ...(extra||{}) };
  }

  // Open mobile overlay
  document.getElementById('mobile-open-btn')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, showMobile: true, ...mobReset() };
    render();
  });

  // Close mobile overlay
  document.getElementById('mobile-close')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, showMobile: false };
    render();
  });
  document.getElementById('mobile-overlay')?.addEventListener('click', e => {
    if (e.target === document.getElementById('mobile-overlay')) {
      S = { ...S, showMobile: false };
      render();
    }
  });

  // Start a flow from home screen
  document.querySelectorAll('[data-mob-action]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const flowId = el.dataset.mobAction;
      const flow = MOBILE_FLOWS[flowId];
      if (!flow) return;
      const introMsg = { role:'agent', text: flow.intro };
      const firstStep = flow.steps[0];
      S = { ...S, mobileFlow: flowId, mobileStep: 0, mobileMsgs: [], mobileTyping: true, mobileChecked: [], mobileDeclared: [], mobileSigned: false };
      render(); mobScrollBottom();
      setTimeout(() => {
        S = { ...S, mobileTyping: false, mobileMsgs: [introMsg] };
        render(); mobScrollBottom();
        setTimeout(() => {
          S = { ...S, mobileTyping: true };
          render(); mobScrollBottom();
          setTimeout(() => {
            S = { ...S, mobileTyping: false, mobileMsgs: [...S.mobileMsgs, { role:'agent', ...firstStep }], mobileStep: 1 };
            render(); mobScrollBottom();
          }, 900);
        }, 400);
      }, 800);
    })
  );

  // Hamburger → open drawer
  document.getElementById('mob-hamburger')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDrawerOpen: true };
    render();
  });
  // Drawer overlay click → close drawer
  document.getElementById('mob-drawer-overlay')?.addEventListener('click', e => {
    if (e.target.id === 'mob-drawer-overlay') {
      S = { ...S, mobileDrawerOpen: false };
      render();
    }
  });
  // Drawer close button
  document.getElementById('mob-drawer-close')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDrawerOpen: false };
    render();
  });
  // Drawer nav items
  document.querySelectorAll('[data-mob-drawer-nav]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const flowId = el.dataset.mobAction;
      S = { ...S, mobileDrawerOpen: false };
      if (flowId === 'drawings') {
        S = { ...S, mobileScreen: 'drawings', mobileDwgFolder: null, mobileDwgDoc: null, mobileFlow: null, mobileStep: 0, mobileMsgs: [], mobileTyping: false };
        render();
      } else if (MOBILE_FLOWS[flowId]) {
        // Start the flow
        el.dispatchEvent(new Event('_startflow'));
      } else {
        render();
      }
    })
  );

  // Back to home (or drawings nav)
  document.querySelectorAll('[data-mob-back]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, ...mobReset() };
      render();
    })
  );

  // Mobile drawing viewer nav
  document.querySelectorAll('[data-mob-dwg-back]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (S.mobileDwgDoc) {
        S = { ...S, mobileDwgDoc: null, mobileDwgZoom: 1, mobileDwgShowInfo: false };
      } else if (S.mobileDwgFolder) {
        S = { ...S, mobileDwgFolder: null };
      } else {
        S = { ...S, mobileScreen: 'agent' };
      }
      render();
    })
  );

  document.querySelectorAll('[data-mob-dwg-folder]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, mobileDwgFolder: el.dataset.mobDwgFolder };
      render();
    })
  );

  document.querySelectorAll('[data-mob-dwg-doc]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, mobileDwgDoc: el.dataset.mobDwgDoc, mobileDwgZoom: 1, mobileDwgShowInfo: false };
      render();
    })
  );

  document.getElementById('mob-dwg-zoom-in')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDwgZoom: Math.min(3, (S.mobileDwgZoom || 1) + 0.25) };
    render();
  });

  document.getElementById('mob-dwg-zoom-out')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDwgZoom: Math.max(0.5, (S.mobileDwgZoom || 1) - 0.25) };
    render();
  });

  document.getElementById('mob-dwg-info')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDwgShowInfo: !S.mobileDwgShowInfo };
    render();
  });

  document.getElementById('mob-dwg-info-close')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, mobileDwgShowInfo: false };
    render();
  });

  // Chip tapped — send as user message, advance flow
  document.querySelectorAll('[data-mob-chip]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      mobAdvanceFlow(el.dataset.mobChip);
    })
  );

  // Checklist item toggle
  document.querySelectorAll('[data-mob-check]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(el.dataset.mobCheck);
      const ch = S.mobileChecked || [];
      S = { ...S, mobileChecked: ch.includes(idx) ? ch.filter(i=>i!==idx) : [...ch, idx] };
      render();
    })
  );

  // Declaration toggle
  document.querySelectorAll('[data-mob-declare]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(el.dataset.mobDeclare);
      const dc = S.mobileDeclared || [];
      S = { ...S, mobileDeclared: dc.includes(idx) ? dc.filter(i=>i!==idx) : [...dc, idx] };
      render();
    })
  );

  // Sign
  document.querySelectorAll('[data-mob-sign]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, mobileSigned: true };
      render(); mobScrollBottom();
    })
  );

  // Advance card (checklist all done, declarations all done, signature submitted)
  document.querySelectorAll('[data-mob-advance]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      mobAdvanceFlow(null);
    })
  );

  // Done — back to home
  document.querySelectorAll('[data-mob-done]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, ...mobReset() };
      render();
    })
  );

  // Send typed message
  document.getElementById('mob-send')?.addEventListener('click', e => {
    e.stopPropagation();
    const input = document.getElementById('mob-input');
    const txt = input?.value?.trim();
    if (txt) { input.value = ''; mobAdvanceFlow(txt); }
  });
  document.getElementById('mob-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const txt = e.target.value.trim();
      if (txt) { e.target.value = ''; mobAdvanceFlow(txt); }
    }
  });

  // ── Drawing Upload Modal handlers ───────────────────────────
  document.getElementById('dwg-upload-btn')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, dwgUploadOpen: true, dwgUploadStep: 0, dwgProcessingIdx: 0, dwgSampleMode: false };
    render();
  });

  document.getElementById('dwg-upload-overlay')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      S = { ...S, dwgUploadOpen: false };
      render();
    }
  });

  document.getElementById('dwg-use-sample')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, dwgUploadStep: 1, dwgProcessingIdx: 0, dwgSampleMode: true };
    render();
    let idx = 0;
    function advanceSample() {
      idx++;
      S = { ...S, dwgProcessingIdx: idx };
      render();
      if (idx < 5) setTimeout(advanceSample, 900);
      else setTimeout(() => { S = { ...S, dwgUploadStep: 2 }; render(); }, 900);
    }
    setTimeout(advanceSample, 900);
  });

  document.getElementById('dwg-file-input')?.addEventListener('change', e => {
    if (!e.target.files || !e.target.files.length) return;
    S = { ...S, dwgUploadStep: 1, dwgProcessingIdx: 0, dwgSampleMode: false };
    render();
    let idx = 0;
    function advanceProcessing() {
      if (idx < 5) {
        idx++;
        S = { ...S, dwgProcessingIdx: idx };
        render();
        if (idx < 5) setTimeout(advanceProcessing, 900);
        else setTimeout(() => { S = { ...S, dwgUploadStep: 2 }; render(); }, 900);
      }
    }
    setTimeout(advanceProcessing, 900);
  });

  document.getElementById('dwg-confirm-upload')?.addEventListener('click', e => {
    e.stopPropagation();
    if (S.dwgSampleMode) {
      S = { ...S, dwgUploadStep: 3, dwgSampleAdded: true };
    } else {
      S = { ...S, dwgUploadStep: 3, dwgLatestRev: 'D' };
    }
    render();
  });

  document.getElementById('dwg-close-upload')?.addEventListener('click', e => {
    e.stopPropagation();
    S = { ...S, dwgUploadOpen: false };
    render();
  });

  // ── SWMS & HRCW event handlers ───────────────────────────────

  // Open SWMS detail view
  document.querySelectorAll('[data-swms-open]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const docId = el.dataset.swmsOpen;
      const goSignOn = el.hasAttribute('data-swms-direct-signon');
      S = { ...S, view: 'con-swms', swmsView: goSignOn ? 'sign-on' : 'detail', swmsDoc: docId, swmsTab: 'document', swmsKioskCount: 0 };
      render();
    })
  );

  // Navigate between SWMS sub-views (register / detail / sign-on)
  document.querySelectorAll('[data-swms-nav]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      const nav = el.dataset.swmsNav;
      if (nav === 'register') {
        S = { ...S, swmsView: 'register', swmsDoc: null, swmsTab: 'document', swmsKioskCount: 0 };
      } else if (nav === 'sign-on') {
        S = { ...S, swmsView: 'sign-on', swmsKioskCount: 0 };
      } else if (nav === 'detail') {
        S = { ...S, swmsView: 'detail', swmsTab: S.swmsTab || 'document' };
      } else {
        S = { ...S, swmsView: nav };
      }
      render();
    })
  );

  // Switch tabs within SWMS detail view
  document.querySelectorAll('[data-swms-tab]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      S = { ...S, swmsTab: el.dataset.swmsTab };
      render();
    })
  );

  // Kiosk sign-on button — increment signed count
  const kioskBtn = document.getElementById('kiosk-sign-btn');
  if (kioskBtn) {
    kioskBtn.addEventListener('click', e => {
      e.stopPropagation();
      const doc = SWMS_DOCS.find(d => d.id === S.swmsDoc);
      const totalWorkers = doc ? doc.workers.length : 8;
      if (S.swmsKioskCount < totalWorkers) {
        S = { ...S, swmsKioskCount: S.swmsKioskCount + 1 };
        render();
      }
    });
  }
}

render();
</script>
</body>
</html>
